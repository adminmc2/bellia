<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logo Novia - Test</title>
  <style>
    ::-webkit-scrollbar {
      width: 0.625rem;
      height: 0.625rem;
    }

    ::-webkit-scrollbar-thumb {
      background: #111;
      border-radius: 0.3125rem;
      box-shadow: inset 0.125rem 0.125rem 0.125rem rgba(255, 255, 255, 0.25),
        inset -0.125rem -0.125rem 0.125rem rgba(0, 0, 0, 0.25);
      cursor: default;
    }

    ::-webkit-scrollbar-track {
      background: #333;
    }

    ::selection {
      background: #fff;
      color: #333;
    }

    html,
    body {
      height: 100vh;
      height: 100dvh;
      margin: 0;
      overflow: hidden;
    }

    body {
      display: grid;
      grid-template-rows: calc(100dvh - 4rem) 4rem;
      font-family: system-ui, sans-serif;
    }

    canvas,
    .editor,
    #controls {
      grid-row: 1;
      grid-column: 1;
    }

    canvas {
      --canvas-z-index: 0;
      width: 100%;
      height: 100vh;
      object-fit: contain;
      background: black;
      touch-action: none;
      z-index: var(--canvas-z-index);
    }

    .editor,
    .overlay,
    #error {
      font-family: 'Courier New', Courier, monospace;
      background: repeating-linear-gradient(0deg, #000a, #1119, #000a .25rem);
      padding: 1em;
    }

    .editor {
      color: #fefefe;
      tab-size: 2;
      border: none;
      resize: none;
    }

    .editor:focus {
      outline: none;
    }

    #error {
      grid-row: 2;
      grid-column: 1;
      margin: 0;
      padding-block: 0;
      padding-top: .5em;
      color: firebrick;
      overflow: auto;
      text-wrap: pretty;
    }

    #indicator {
      visibility: hidden;
      position: absolute;
      top: calc(var(--top, 0px) - var(--scroll-top, 0px));
      width: 0;
      height: 0;
      border-top: 10px solid transparent;
      border-bottom: 10px solid transparent;
      border-left: 10px solid firebrick;
      transform: translateY(-25%);
    }

    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      margin: 0;
    }

    .editor,
    .overlay {
      font-size: 1rem;
      line-height: 1.2;
      white-space: pre;
    }

    #controls {
      position: fixed;
      top: 1em;
      right: 2em;
    }

    .controls {
      position: relative;
      display: flex;
      gap: 1.5em;
      padding: .5em 1.25em;
      background: #1111;
      border-radius: 4px;
    }

    .controls::before,
    .controls::after {
      content: '';
      position: absolute;
      z-index: -1;
      inset: 0;
      transform: scale(.95);
      border-radius: inherit;
      opacity: 0;
    }

    .controls::before {
      background: #aef;
      animation: pulse 2s infinite;
    }

    .controls::after {
      background: #fefefe66;
      transition: transform 200ms ease-in-out;
    }

    .controls:hover::before,
    .controls:hover::after {
      opacity: 1;
    }

    .controls:hover::before {
      transform: scale(.98);
      filter: blur(2px);
    }

    .controls:hover::after {
      transform: scale(1.025, 1.1);
    }

    .controls:hover {
      background: #111f;
    }

    @keyframes pulse {
      0% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.0125);
      }

      100% {
        transform: scale(1);
      }
    }

    .hidden {
      display: none !important;
    }

    .opaque {
      opacity: 1 !important;
      background: #111 !important;
    }

    input {
      all: unset;
      opacity: .2;
      filter: saturate(0) invert(1);
      cursor: pointer;
      transition: opacity 200ms ease-in-out;
      padding: .25em .5em;
    }

    input:hover {
      opacity: 1;
    }

    .icon {
      text-align: center;
      line-height: 1;
    }

    #btnToggleView {
      width: 1.25em;
    }

    #btnToggleView::after {
      content: '👁';
    }

    #btnToggleView:checked::after {
      content: '✏️';
    }

    #btnToggleResolution::after {
      content: '1️⃣';
    }

    #btnToggleResolution:checked::after {
      content: '2️⃣';
    }

    #btnReset::after {
      content: '⏮️';
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <textarea id="codeEditor" class="editor hidden" spellcheck="false" autocorrect="off" autocapitalize="off" translate="no" oninput="render()"></textarea>
  <pre id="error" class="hidden"></pre>
  <div id="indicator"></div>
  <div id="controls">
    <div class="controls">
      <input id="btnToggleView" class="icon" type="checkbox" checked name="toggleView" onclick="toggleView()">
      <input id="btnToggleResolution" class="icon" type="checkbox" name="toggleResolution" onchange="toggleResolution()">
      <input id="btnReset" class="icon" type="checkbox" name="reset" onclick="reset()">
    </div>
  </div>

  <!-- Shader con colores Novacutan: azul-morado (#667eea, #764ba2, #6B73FF) -->
  <script type="x-shader/x-fragment" id="shaderSource">#version 300 es
/*********
* Logo Novia - Novacutan
* Colores: Azul-morado (#667eea, #764ba2)
*/
#ifdef GL_FRAGMENT_PRECISION_HIGH
precision highp float;
#else
precision mediump float;
#endif
out vec4 O;
uniform float time;
uniform vec2 resolution;
#define FC gl_FragCoord.xy
#define R resolution
#define T time
#define S smoothstep
#define SE(v,a) S(fwidth(a),-7e-3,v-a)
#define MN min(R.x,R.y)
#define MX max(R.x,R.y)
#define reveal(p) SE(MN/MX*length(p),sqrt(S(1.,.0,1./T*1.8)))
#define TAU radians(360.)
#define PI (TAU/2.)

// Paleta Novacutan con variación intensa
// Colores base: azul #667eea, morado #764ba2, rosa #f093fb
vec3 novacutanHue(float a) {
  // Colores Novacutan
  vec3 blue = vec3(0.4, 0.494, 0.918);      // #667eea
  vec3 purple = vec3(0.463, 0.294, 0.635);  // #764ba2
  vec3 pink = vec3(0.941, 0.576, 0.984);    // #f093fb
  vec3 cyan = vec3(0.42, 0.85, 1.0);        // cyan accent

  // Transición intensa entre colores
  float t = a * 2.0;
  vec3 col;
  if (t < 1.0) {
    col = mix(blue, purple, smoothstep(0.0, 1.0, t));
  } else if (t < 2.0) {
    col = mix(purple, pink, smoothstep(1.0, 2.0, t));
  } else if (t < 3.0) {
    col = mix(pink, cyan, smoothstep(2.0, 3.0, t));
  } else {
    col = mix(cyan, blue, smoothstep(3.0, 4.0, t));
  }

  // Añadir variación sinusoidal para el brillo intenso
  col += 0.3 * sin(PI * a + vec3(0.0, 2.0, 4.0));
  return clamp(col, 0.0, 1.0);
}
#define hue(a) novacutanHue(a)

mat2 rot(float a) {
  float c=cos(a), s=sin(a);
  return mat2(c,-s,s,c);
}

vec2 pmod(vec2 p, float n) {
  float
  a=atan(p.x,p.y),
  b=TAU/n;
  a=floor(.5+a/b)*b;
  return rot(-a)*p;
}

vec3 pattern(inout vec2 uv) {
  uv=pmod(uv,9.);
  uv=uv.yx;
  vec2 p=uv;
  float n=2.8;
  uv.x-=clamp(round(uv.x*n),1.,4.)/n;
  float id=clamp(round(uv.x*n),1.,4.);
  uv.x-=sin(-1.6+id+T*PI+p.x*id)*.0125+.005;
  float d=SE(length(uv),.023*(6.-round(p.x*n)));
  vec3 col=vec3(0), c=hue(.2*(round(p.x*n)-T*5.)+S(-.25,1.,uv.x)*.5);
  col+=tanh(c*c*c)*clamp(d*d*d,.0,1.);
  return sqrt(col);
}

void main() {
  vec2 uv=(FC-.5*R)/MN,p,st=uv;
  uv*=4.;
  uv*=rot(.02*sin(T-uv.y*2.)-.0125);
  p=uv;
  p*=rot(.0125);
  vec3 col, c=pattern(uv);
  float k=.05/length(uv)*pow(.5+.5*sin(T*PI),3.);
  col=mix(k*tanh(c*c*c),pattern(p),.985);
  col*=reveal(st);

  // Añadir un brillo azul-morado sutil en el centro
  float glow = exp(-length(st) * 3.0) * 0.3;
  col += vec3(0.4, 0.3, 0.9) * glow;

  O=vec4(col,1);
}</script>

  <script>
    /*********
     * made by Matthias Hurrle (@atzedent)
     * Modified for Novacutan
     */
    let editMode = false
    let resolution = 1
    let renderDelay = 1000
    let dpr = Math.max(1, resolution * window.devicePixelRatio)
    let frm, source, editor, store, renderer, pointers
    const shaderId = 'NovacutanLogo'
    window.onload = init

    function resize() {
      const { innerWidth: width, innerHeight: height } = window
      canvas.width = width * dpr
      canvas.height = height * dpr
      if (renderer) {
        renderer.updateScale(dpr)
      }
    }

    function toggleView() {
      editor.hidden = btnToggleView.checked
      canvas.style.setProperty('--canvas-z-index', btnToggleView.checked ? 0 : -1)
    }

    function reset() {
      let shader = source
      editor.text = shader ? shader.textContent : renderer.defaultSource
      store.putShaderSource(shaderId, editor.text)
      renderThis()
    }

    function toggleResolution() {
      resolution = btnToggleResolution.checked ? .5 : 1
      dpr = Math.max(1, resolution * window.devicePixelRatio)
      pointers.updateScale(dpr)
      resize()
    }

    function loop(now) {
      renderer.updateMouse(pointers.first)
      renderer.updatePointerCount(pointers.count)
      renderer.updatePointerCoords(pointers.coords)
      renderer.updateMove(pointers.move)
      renderer.render(now)
      frm = requestAnimationFrame(loop)
    }

    function renderThis() {
      editor.clearError()
      store.putShaderSource(shaderId, editor.text)
      const result = renderer.test(editor.text)
      if (result) {
        editor.setError(result)
      } else {
        renderer.updateShader(editor.text)
      }
      cancelAnimationFrame(frm)
      loop(0)
    }

    const debounce = (fn, delay) => {
      let timerId
      return (...args) => {
        clearTimeout(timerId)
        timerId = setTimeout(() => fn.apply(this, args), delay)
      }
    }

    const render = debounce(renderThis, renderDelay)

    function init() {
      source = document.getElementById('shaderSource')
      document.title = "Logo Novia - Novacutan"
      renderer = new Renderer(canvas, dpr)
      pointers = new PointerHandler(canvas, dpr)
      store = new Store(window.location)
      editor = new Editor(codeEditor, error, indicator)
      editor.text = source.textContent
      renderer.setup()
      renderer.init()

      if (!editMode) {
        btnToggleView.checked = true
        toggleView()
      }
      if (resolution === .5) {
        btnToggleResolution.checked = true
        toggleResolution()
      }
      canvas.addEventListener('shader-error', e => editor.setError(e.detail))
      resize()
      if (renderer.test(source.textContent) === null) {
        renderer.updateShader(source.textContent)
      }
      loop(0)
      window.onresize = resize
      window.addEventListener("keydown", e => {
        if (e.key === "L" && e.ctrlKey) {
          e.preventDefault()
          btnToggleView.checked = !btnToggleView.checked
          toggleView()
        }
      })
    }

    class Renderer {
      #vertexSrc = "#version 300 es\nprecision highp float;\nin vec4 position;\nvoid main(){gl_Position=position;}"
      #fragmtSrc = "#version 300 es\nprecision highp float;\nout vec4 O;\nuniform float time;\nuniform vec2 resolution;\nvoid main() {\n\tvec2 uv=gl_FragCoord.xy/resolution;\n\tO=vec4(uv,sin(time)*.5+.5,1);\n}"
      #vertices = [-1, 1, -1, -1, 1, 1, 1, -1]

      constructor(canvas, scale) {
        this.canvas = canvas
        this.scale = scale
        this.gl = canvas.getContext("webgl2")
        this.gl.viewport(0, 0, canvas.width * scale, canvas.height * scale)
        this.shaderSource = this.#fragmtSrc
        this.mouseMove = [0, 0]
        this.mouseCoords = [0, 0]
        this.pointerCoords = [0, 0]
        this.nbrOfPointers = 0
      }

      get defaultSource() { return this.#fragmtSrc }

      updateShader(source) {
        this.reset()
        this.shaderSource = source
        this.setup()
        this.init()
      }

      updateMove(deltas) { this.mouseMove = deltas }
      updateMouse(coords) { this.mouseCoords = coords }
      updatePointerCoords(coords) { this.pointerCoords = coords }
      updatePointerCount(nbr) { this.nbrOfPointers = nbr }

      updateScale(scale) {
        this.scale = scale
        this.gl.viewport(0, 0, this.canvas.width * scale, this.canvas.height * scale)
      }

      compile(shader, source) {
        const gl = this.gl
        gl.shaderSource(shader, source)
        gl.compileShader(shader)
        if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
          console.error(gl.getShaderInfoLog(shader))
          this.canvas.dispatchEvent(new CustomEvent('shader-error', { detail: gl.getShaderInfoLog(shader) }))
        }
      }

      test(source) {
        let result = null
        const gl = this.gl
        const shader = gl.createShader(gl.FRAGMENT_SHADER)
        gl.shaderSource(shader, source)
        gl.compileShader(shader)
        if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
          result = gl.getShaderInfoLog(shader)
        }
        if (gl.getShaderParameter(shader, gl.DELETE_STATUS)) {
          gl.deleteShader(shader)
        }
        return result
      }

      reset() {
        const { gl, program, vs, fs } = this
        if (!program || gl.getProgramParameter(program, gl.DELETE_STATUS)) return
        if (gl.getShaderParameter(vs, gl.DELETE_STATUS)) {
          gl.detachShader(program, vs)
          gl.deleteShader(vs)
        }
        if (gl.getShaderParameter(fs, gl.DELETE_STATUS)) {
          gl.detachShader(program, fs)
          gl.deleteShader(fs)
        }
        gl.deleteProgram(program)
      }

      setup() {
        const gl = this.gl
        this.vs = gl.createShader(gl.VERTEX_SHADER)
        this.fs = gl.createShader(gl.FRAGMENT_SHADER)
        this.compile(this.vs, this.#vertexSrc)
        this.compile(this.fs, this.shaderSource)
        this.program = gl.createProgram()
        gl.attachShader(this.program, this.vs)
        gl.attachShader(this.program, this.fs)
        gl.linkProgram(this.program)
        if (!gl.getProgramParameter(this.program, gl.LINK_STATUS)) {
          console.error(gl.getProgramInfoLog(this.program))
        }
      }

      init() {
        const { gl, program } = this
        this.buffer = gl.createBuffer()
        gl.bindBuffer(gl.ARRAY_BUFFER, this.buffer)
        gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(this.#vertices), gl.STATIC_DRAW)
        const position = gl.getAttribLocation(program, "position")
        gl.enableVertexAttribArray(position)
        gl.vertexAttribPointer(position, 2, gl.FLOAT, false, 0, 0)
        program.resolution = gl.getUniformLocation(program, "resolution")
        program.time = gl.getUniformLocation(program, "time")
        program.move = gl.getUniformLocation(program, "move")
        program.touch = gl.getUniformLocation(program, "touch")
        program.pointerCount = gl.getUniformLocation(program, "pointerCount")
        program.pointers = gl.getUniformLocation(program, "pointers")
      }

      render(now = 0) {
        const { gl, program, buffer, canvas, mouseMove, mouseCoords, pointerCoords, nbrOfPointers } = this
        if (!program || gl.getProgramParameter(program, gl.DELETE_STATUS)) return
        gl.clearColor(0, 0, 0, 1)
        gl.clear(gl.COLOR_BUFFER_BIT)
        gl.useProgram(program)
        gl.bindBuffer(gl.ARRAY_BUFFER, buffer)
        gl.uniform2f(program.resolution, canvas.width, canvas.height)
        gl.uniform1f(program.time, now * 1e-3)
        gl.uniform2f(program.move, ...mouseMove)
        gl.uniform2f(program.touch, ...mouseCoords)
        gl.uniform1i(program.pointerCount, nbrOfPointers)
        gl.uniform2fv(program.pointers, pointerCoords)
        gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4)
      }
    }

    class Store {
      constructor(key) {
        this.key = key
        this.store = window.localStorage
      }
      #StorageType = Object.freeze({ shader: 'fragmentSource', config: 'config' })
      #getKeyPrefix(type) { return `${type}${btoa(this.key)}` }
      #getKey(type, name) { return `${this.#getKeyPrefix(type)}${btoa(name)}` }
      putShaderSource(name, source) {
        const storageType = this.#StorageType.shader
        this.store.setItem(this.#getKey(storageType, name), source)
      }
      getShaderSource(name) {
        const storageType = this.#StorageType.shader
        return this.store.getItem(this.#getKey(storageType, name))
      }
    }

    class PointerHandler {
      constructor(element, scale) {
        this.scale = scale
        this.active = false
        this.pointers = new Map()
        this.lastCoords = [0, 0]
        this.moves = [0, 0]
        const map = (element, scale, x, y) => [x * scale, element.height - y * scale]
        element.addEventListener("pointerdown", (e) => {
          this.active = true
          this.pointers.set(e.pointerId, map(element, this.getScale(), e.clientX, e.clientY))
        })
        element.addEventListener("pointerup", (e) => {
          if (this.count === 1) this.lastCoords = this.first
          this.pointers.delete(e.pointerId)
          this.active = this.pointers.size > 0
        })
        element.addEventListener("pointerleave", (e) => {
          if (this.count === 1) this.lastCoords = this.first
          this.pointers.delete(e.pointerId)
          this.active = this.pointers.size > 0
        })
        element.addEventListener("pointermove", (e) => {
          if (!this.active) return
          this.lastCoords = [e.clientX, e.clientY]
          this.pointers.set(e.pointerId, map(element, this.getScale(), e.clientX, e.clientY))
          this.moves = [this.moves[0] + e.movementX, this.moves[1] + e.movementY]
        })
      }
      getScale() { return this.scale }
      updateScale(scale) { this.scale = scale }
      get count() { return this.pointers.size }
      get move() { return this.moves }
      get coords() { return this.pointers.size > 0 ? Array.from(this.pointers.values()).map((p) => [...p]).flat() : [0, 0] }
      get first() { return this.pointers.values().next().value || this.lastCoords }
    }

    class Editor {
      constructor(textarea, errorfield, errorindicator) {
        this.textarea = textarea
        this.errorfield = errorfield
        this.errorindicator = errorindicator
      }
      get hidden() { return this.textarea.classList.contains('hidden') }
      set hidden(value) { value ? this.#hide() : this.#show() }
      get text() { return this.textarea.value }
      set text(value) { this.textarea.value = value }
      setError(message) {
        this.errorfield.innerHTML = message
        this.errorfield.classList.add('opaque')
      }
      clearError() {
        this.errorfield.textContent = ''
        this.errorfield.classList.remove('opaque')
      }
      #hide() {
        for (const el of [this.errorindicator, this.errorfield, this.textarea]) {
          el.classList.add('hidden')
        }
      }
      #show() {
        for (const el of [this.errorindicator, this.errorfield, this.textarea]) {
          el.classList.remove('hidden')
        }
      }
    }
  </script>
</body>
</html>
